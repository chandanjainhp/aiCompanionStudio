# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aicompanionstudio.chandanjainhp.in;

    # Allow Let's Encrypt / Certbot ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (SSL) server ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name aicompanionstudio.chandanjainhp.in;

    # ── SSL Certificate (Let's Encrypt / Certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/aicompanionstudio.chandanjainhp.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aicompanionstudio.chandanjainhp.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Proxy common settings ──────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (needed for Vite HMR / SSE)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ── API requests → backend container (port 3000) ───────────────────────
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── Everything else → React SPA container (port 3001) ─────────────────
    location / {
        proxy_pass http://localhost:3001;
    }
}
